workflows:
  ios-release:
    name: iOS Release

    integrations:
      app_store_connect: dft_app

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - flutter pub get
      - flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        integration: dft_app
        submit_to_testflight: true