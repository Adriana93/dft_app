workflows:
  ios-release:
    name: iOS Release

    environment:
      flutter: stable
      xcode: latest

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.dftapp.hu

    scripts:
      - name: Clean
        script: flutter clean

      - name: Install dependencies
        script: flutter pub get

      - name: Install iOS pods
        script: |
          cd ios
          pod install
          cd ..

      - name: Build IPA
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

